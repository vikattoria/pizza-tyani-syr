<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { text-align:center; margin-top:100px; font-family:'Poppins', sans-serif; background:#f4f4f4; }
        .login-card { background: white; padding: 40px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input { display: block; width: 250px; padding: 12px; margin: 10px auto; border: 1px solid #ddd; border-radius: 10px; }
        button { padding: 12px 30px; border: none; border-radius: 10px; background: #e63939; color: white; font-weight: bold; cursor: pointer; }
        .reg-link { display: block; margin-top: 15px; color: #777; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Вход в Тяни-сыр</h2>
    <input id="login-input" placeholder="Логин">
    <input id="password-input" type="password" placeholder="Пароль">
    <button onclick="checkLogin()">Войти</button>
    <a href="register.html" class="reg-link">Нет аккаунта? Зарегистрироваться</a>
</div>

<script>
function checkLogin() {
    let log = document.getElementById("login-input").value;
    let pass = document.getElementById("password-input").value;

    // 1. Проверка на админа
    if(log === "admin" && pass === "1234") {
        localStorage.setItem("role", "admin");
        localStorage.setItem("currentUser", JSON.stringify({name: "Админ", login: "admin"}));
        window.location.href = "admin.html";
        return;
    }

    // 2. Проверка обычных юзеров
    let users = JSON.parse(localStorage.getItem("users")) || [];
    let foundUser = users.find(u => u.login === log && u.password === pass);

    if(foundUser) {
        localStorage.setItem("role", "user");
        localStorage.setItem("currentUser", JSON.stringify(foundUser));
        window.location.href = "index.html";
    } else {
        alert("Ошибка! Проверьте логин/пароль или зарегистрируйтесь.");
    }
}
</script>

</body>
</html>
